<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pickle Queue 🥒</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0f0f0f; color: #e8e8e8; font-family: -apple-system, 'Inter', sans-serif; padding: 16px; max-width: 480px; margin: 0 auto; min-height: 100vh; min-height: 100dvh; }
  .header { text-align: center; margin-bottom: 24px; }
  .header h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  .header p { font-size: 13px; color: #888; margin-top: 4px; }
  .stats { display: flex; gap: 8px; margin-bottom: 16px; }
  .stat { flex: 1; background: #1a1a1a; border-radius: 10px; padding: 10px 8px; text-align: center; border: 1px solid #2a2a2a; }

  .stat-label { font-size: 11px; color: #666; margin-top: 2px; }

  .add-row input { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 12px 14px; color: #fff; font-size: 15px; outline: none; }

  .game-btn.end { background: linear-gradient(135deg, #ef4444, #dc2626); }
  .game-btn:disabled { background: #2a2a2a; color: #555; cursor: default; }
  .section-header { background: none; border: none; color: #aaa; font-size: 14px; font-weight: 600; cursor: pointer; padding: 6px 0; display: flex; align-items: center; gap: 6px; }
  .section-header .count { color: #555; font-weight: 400; }

  .rank.highlight { color: #f59e0b; background: #f59e0b22; }
  .player-info { flex: 1; min-width: 0; }

  .player-meta { font-size: 11px; color: #555; margin-top: 2px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .sat-warn { }
  .sat-0 { color: #555; }
  .sat-1 { color: #f59e0b; }
  .sat-2 { color: #ef4444; }

  .remove-btn { background: none; border: none; color: #444; font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .return-btn { background: #1a2a1a; color: #4ade80; border: 1px solid #2a3a2a; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
  .inactive-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #151515; border-radius: 8px; margin-bottom: 4px; }
  .inactive-row span { color: #555; font-size: 14px; }
  .history-toggle { background: none; border: none; color: #666; font-size: 13px; cursor: pointer; padding: 8px 0; }
  .history-item { background: #1a1a1a; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; border: 1px solid #222; }
  .history-game { font-size: 12px; color: #f59e0b; font-weight: 600; margin-bottom: 4px; }
  .history-teams { font-size: 13px; color: #888; line-height: 1.6; }
  .history-team-w { color: #4ade80; }
  .history-team-l { color: #888; }
  .info-box { margin-top: 24px; padding: 16px; background: #1a1a1a; border-radius: 12px; border: 1px solid #2a2a2a; }
  .info-box .title { font-size: 13px; font-weight: 600; color: #888; margin-bottom: 8px; }
  .info-box .desc { font-size: 13px; color: #666; line-height: 1.6; }
  .edit-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .edit-bar button { flex: 1; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid #333; background: #1a1a1a; color: #aaa; }
  .edit-bar button.active { border-color: #a855f7; color: #a855f7; background: #a855f722; }
  .edit-bar button.swap-active { border-color: #f59e0b; color: #f59e0b; background: #f59e0b22; }
  .edit-bar button.pair-active { border-color: #ec4899; color: #ec4899; background: #ec489922; }
  .player-row.swap-select { border-color: #f59e0b !important; background: #f59e0b11 !important; animation: swapPulse 1s ease-in-out infinite; }
  .player-row.pair-select { border-color: #ec4899 !important; background: #ec489911 !important; animation: pairPulse 1s ease-in-out infinite; }
  @keyframes swapPulse {
    0%, 100% { box-shadow: 0 0 0 0 #f59e0b00; }
    50% { box-shadow: 0 0 8px 2px #f59e0b44; }
  }
  @keyframes pairPulse {
    0%, 100% { box-shadow: 0 0 0 0 #ec489900; }
    50% { box-shadow: 0 0 8px 2px #ec489944; }
  }
  .swap-banner { background: #f59e0b22; border: 1px solid #f59e0b44; border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: #f59e0b; text-align: center; }
  .pair-banner { background: #ec489922; border: 1px solid #ec489944; border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: #ec4899; text-align: center; }
  @keyframes swapFlash {
    0% { transform: scale(1); box-shadow: 0 0 0 0 #a855f700; }
    30% { transform: scale(1.02); box-shadow: 0 0 12px 2px #a855f766; border-color: #a855f7; }
    100% { transform: scale(1); box-shadow: 0 0 0 0 #a855f700; }
  }
  .player-row.swap-anim { animation: swapFlash 0.5s ease-out; }

  /* Court setup screen */
  .setup-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 24px; margin-bottom: 16px; text-align: center; }
  .setup-card h2 { font-size: 18px; color: #fff; margin-bottom: 8px; }
  .setup-card p { font-size: 13px; color: #888; margin-bottom: 16px; }
  .court-pick { display: flex; gap: 8px; justify-content: center; }
  .court-pick button { flex: 1; padding: 16px; border-radius: 12px; border: 2px solid #333; background: #141414; color: #aaa; font-size: 18px; font-weight: 700; cursor: pointer; }
  .court-pick button:hover, .court-pick button:active { border-color: #22c55e; color: #22c55e; }

  /* Court card */
  .court { background: #121212; border: 1px solid #2a2a2a; border-radius: 14px; padding: 14px; margin-bottom: 14px; }
  .court-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .court-title { font-size: 15px; font-weight: 700; color: #fff; }
  .court-status { font-size: 11px; color: #666; padding: 3px 8px; border-radius: 10px; background: #1f1f1f; }
  .court-status.idle { color: #666; }
  .court-status.setup { color: #f59e0b; background: #f59e0b18; }
  .court-status.playing { color: #4ade80; background: #4ade8018; }
  .team { background: #181818; border: 1px solid #262626; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
  .team-label { font-size: 11px; color: #666; font-weight: 600; margin-bottom: 6px; letter-spacing: 0.5px; }
  .team-label.a { color: #3b82f6; }
  .team-label.b { color: #ec4899; }
  .team-player { font-size: 14px; color: #ddd; padding: 6px 8px; border-radius: 6px; display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .team-player.swap-target { background: #f59e0b18; border: 1px dashed #f59e0b66; cursor: pointer; }
  .team-player.swap-selected { background: #f59e0b33; border: 1px solid #f59e0b; }
  .team-player .swap-pick { background: none; border: 1px solid #333; color: #888; border-radius: 5px; font-size: 11px; padding: 2px 8px; cursor: pointer; }
  .team-vs { text-align: center; font-size: 11px; color: #444; margin: 4px 0; font-weight: 700; letter-spacing: 2px; }
  .court-actions { display: flex; gap: 8px; margin-top: 4px; }
  .court-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; color: #fff; }
  .court-btn.start { background: linear-gradient(135deg, #22c55e, #16a34a); }
  .court-btn.regen { background: #1a1a1a; color: #a855f7; border: 1px solid #a855f744; }
  .court-btn.win-a { background: linear-gradient(135deg, #3b82f6, #2563eb); }
  .court-btn.win-b { background: linear-gradient(135deg, #ec4899, #db2777); }
  .court-btn.cancel { background: #1a1a1a; color: #888; border: 1px solid #333; }
  .court-empty { text-align: center; padding: 18px 12px; color: #666; font-size: 13px; }
  .pair-line { font-size: 11px; color: #ec4899; margin-top: 6px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const PLAYERS_PER_COURT = 4;

let state = {
  numCourts: null,
  players: [],
  courts: [],
  pairs: [],
  gameNumber: 0,
  history: [],
  showHistory: false,
  editMode: false,
  swapMode: false,
  swapFirst: null,
  swappedIds: [],
  pairMode: false,
  pairFirst: null,
  teamSwap: { courtId: null, playerId: null },
};

try {
  const saved = localStorage.getItem('pickle-queue-state');
  if (saved) {
    const parsed = JSON.parse(saved);
    state.numCourts = parsed.numCourts != null ? parsed.numCourts : null;
    state.players = parsed.players || [];
    state.courts = parsed.courts || [];
    state.pairs = parsed.pairs || [];
    state.gameNumber = parsed.gameNumber || 0;
    state.history = parsed.history || [];
  }
} catch(e) {}

function saveState() {
  try {
    localStorage.setItem('pickle-queue-state', JSON.stringify({
      numCourts: state.numCourts,
      players: state.players,
      courts: state.courts,
      pairs: state.pairs,
      gameNumber: state.gameNumber,
      history: state.history,
    }));
  } catch(e) {}
}

function getPriority(p) {
  if (p.queueOrder != null) return -p.queueOrder;
  return p.gamesSatOut * 1000000 - p.gamesPlayed * 1000 - p.arrivalOrder;
}

function getActivePlayers() {
  return state.players.filter(p => p.active);
}

function getPlayingIds() {
  const ids = new Set();
  state.courts.forEach(c => {
    if (c.status === 'playing' || c.status === 'setup') {
      [...c.teamA, ...c.teamB].forEach(id => ids.add(id));
    }
  });
  return ids;
}

function getWaitingPlayers() {
  const playing = getPlayingIds();
  return getActivePlayers()
    .filter(p => !playing.has(p.id))
    .sort((a, b) => getPriority(b) - getPriority(a));
}

function getPartner(playerId) {
  for (const pair of state.pairs) {
    if (pair[0] === playerId) return pair[1];
    if (pair[1] === playerId) return pair[0];
  }
  return null;
}

function arePartners(idA, idB) {
  return state.pairs.some(p => (p[0] === idA && p[1] === idB) || (p[0] === idB && p[1] === idA));
}

function findPlayer(id) {
  return state.players.find(p => p.id === id);
}

// --- Court config ---
function chooseCourts(n) {
  state.numCourts = n;
  state.courts = [];
  for (let i = 0; i < n; i++) {
    state.courts.push({ id: i, status: 'idle', teamA: [], teamB: [], gameNumber: null, startedAt: null });
  }
  saveState();
  render();
}

// --- Court actions ---
function setupCourt(courtId) {
  const court = state.courts[courtId];
  if (!court || court.status !== 'idle') return;
  const waiting = getWaitingPlayers();
  if (waiting.length < PLAYERS_PER_COURT) {
    showAddToast(`Need ${PLAYERS_PER_COURT - waiting.length} more waiting player${waiting.length === PLAYERS_PER_COURT - 1 ? '' : 's'}`, '#ef4444');
    return;
  }
  const top4 = waiting.slice(0, 4);
  const next = waiting.slice(4, 8);

  // Pair displacement: if a pair has one in top4 and partner in next (within 2 slots), swap.
  for (const pair of state.pairs) {
    const aTop = top4.findIndex(p => p.id === pair[0]);
    const bTop = top4.findIndex(p => p.id === pair[1]);
    if (aTop >= 0 && bTop >= 0) continue;
    let inIdx = aTop, outId = pair[1];
    if (bTop >= 0) { inIdx = bTop; outId = pair[0]; }
    if (inIdx < 0) continue;
    const outPlayer = next.find(p => p.id === outId);
    if (outPlayer) {
      // Replace top4's lowest-priority slot with the partner
      top4[3] = outPlayer;
      break;
    }
  }

  const [teamA, teamB] = formTeams(top4);
  court.teamA = teamA.map(p => p.id);
  court.teamB = teamB.map(p => p.id);
  court.status = 'setup';
  saveState();
  render();
}

function formTeams(players) {
  // 3 possible splits for 4 players
  const splits = [
    [[players[0], players[1]], [players[2], players[3]]],
    [[players[0], players[2]], [players[1], players[3]]],
    [[players[0], players[3]], [players[1], players[2]]],
  ];

  // If a pair is present in the 4, force them on same team
  let pairIds = null;
  for (let i = 0; i < players.length; i++) {
    for (let j = i + 1; j < players.length; j++) {
      if (arePartners(players[i].id, players[j].id)) {
        pairIds = [players[i].id, players[j].id];
        break;
      }
    }
    if (pairIds) break;
  }

  let candidates = splits;
  if (pairIds) {
    candidates = splits.filter(split =>
      (split[0].some(p => p.id === pairIds[0]) && split[0].some(p => p.id === pairIds[1])) ||
      (split[1].some(p => p.id === pairIds[0]) && split[1].some(p => p.id === pairIds[1]))
    );
  }

  // Score each candidate split
  let bestScore = -Infinity;
  let bestSplit = candidates[0];
  let scoredAny = false;
  for (const split of candidates) {
    let score = 0;
    let hasSignal = false;
    for (const team of split) {
      const [p1, p2] = team;
      // Penalty: same teammates as last game
      if (p1.lastTeammates && p1.lastTeammates.includes(p2.id)) { score -= 100; hasSignal = true; }
      // 1 W + 1 L bonus, or matching tags penalty
      if (p1.lastResult && p2.lastResult) {
        hasSignal = true;
        if (p1.lastResult !== p2.lastResult) score += 10;
        else score -= 5;
      }
    }
    if (hasSignal) scoredAny = true;
    if (score > bestScore) { bestScore = score; bestSplit = split; }
  }

  // No tag signals yet → snake-draft (1+4 vs 2+3) which is splits[2], if allowed
  if (!scoredAny && candidates.includes(splits[2])) bestSplit = splits[2];

  return bestSplit;
}

function regenerateTeams(courtId) {
  const court = state.courts[courtId];
  if (!court || court.status !== 'setup') return;
  const ids = [...court.teamA, ...court.teamB];
  const players = ids.map(findPlayer).filter(Boolean);
  // Cycle through the 3 splits manually
  const splits = [
    [[players[0], players[1]], [players[2], players[3]]],
    [[players[0], players[2]], [players[1], players[3]]],
    [[players[0], players[3]], [players[1], players[2]]],
  ];
  // Find current split index, advance to next valid
  const currentA = new Set(court.teamA);
  let currentIdx = splits.findIndex(s => s[0].every(p => currentA.has(p.id)));
  if (currentIdx < 0) currentIdx = 0;
  const nextIdx = (currentIdx + 1) % 3;
  court.teamA = splits[nextIdx][0].map(p => p.id);
  court.teamB = splits[nextIdx][1].map(p => p.id);
  saveState();
  render();
}

function cancelCourtSetup(courtId) {
  const court = state.courts[courtId];
  if (!court || court.status !== 'setup') return;
  court.teamA = [];
  court.teamB = [];
  court.status = 'idle';
  saveState();
  render();
}

function startCourtGame(courtId) {
  const court = state.courts[courtId];
  if (!court || court.status !== 'setup') return;
  state.gameNumber++;
  court.gameNumber = state.gameNumber;
  court.status = 'playing';
  court.startedAt = Date.now();
  state.teamSwap = { courtId: null, playerId: null };
  saveState();
  render();
}

function endCourtGame(courtId, winner) {
  const court = state.courts[courtId];
  if (!court || court.status !== 'playing') return;
  const winners = winner === 'A' ? court.teamA : court.teamB;
  const playingIds = [...court.teamA, ...court.teamB];

  state.players.forEach(p => {
    if (!p.active) return;
    if (playingIds.includes(p.id)) {
      p.gamesPlayed = (p.gamesPlayed || 0) + 1;
      p.gamesSatOut = 0;
      p.lastResult = winners.includes(p.id) ? 'W' : 'L';
      p.lastTeammates = (court.teamA.includes(p.id) ? court.teamA : court.teamB).filter(id => id !== p.id);
    } else {
      // Only bump sat-out for genuinely waiting players (not playing on a different court)
      const onOtherCourt = state.courts.some(c =>
        c.id !== courtId && (c.status === 'playing' || c.status === 'setup') &&
        (c.teamA.includes(p.id) || c.teamB.includes(p.id))
      );
      if (!onOtherCourt) p.gamesSatOut = (p.gamesSatOut || 0) + 1;
    }
    p.queueOrder = null;
  });

  const teamANames = court.teamA.map(id => findPlayer(id)?.name || '?');
  const teamBNames = court.teamB.map(id => findPlayer(id)?.name || '?');
  state.history.push({
    game: court.gameNumber,
    court: courtId + 1,
    teamA: teamANames,
    teamB: teamBNames,
    winner,
  });

  court.teamA = [];
  court.teamB = [];
  court.status = 'idle';
  court.gameNumber = null;
  court.startedAt = null;
  saveState();
  render();
}

// Manual team swap: tap a player on a court (in setup) → tap another player on the same court to swap teams
function pickTeamSwap(courtId, playerId) {
  const court = state.courts[courtId];
  if (!court || court.status !== 'setup') return;
  if (state.teamSwap.courtId === courtId && state.teamSwap.playerId === playerId) {
    state.teamSwap = { courtId: null, playerId: null };
    render();
    return;
  }
  if (state.teamSwap.courtId !== courtId || state.teamSwap.playerId == null) {
    state.teamSwap = { courtId, playerId };
    render();
    return;
  }
  const firstId = state.teamSwap.playerId;
  const secondId = playerId;
  // Swap whichever is on a different team
  const firstOnA = court.teamA.includes(firstId);
  const secondOnA = court.teamA.includes(secondId);
  if (firstOnA === secondOnA) {
    // Same team — nothing to swap; just reselect
    state.teamSwap = { courtId, playerId: secondId };
    render();
    return;
  }
  if (firstOnA) {
    court.teamA = court.teamA.map(id => id === firstId ? secondId : id);
    court.teamB = court.teamB.map(id => id === secondId ? firstId : id);
  } else {
    court.teamB = court.teamB.map(id => id === firstId ? secondId : id);
    court.teamA = court.teamA.map(id => id === secondId ? firstId : id);
  }
  state.teamSwap = { courtId: null, playerId: null };
  saveState();
  render();
}

// --- Player actions ---
function addPlayer(name) {
  name = name.trim();
  if (!name) return;
  if (state.players.find(p => p.name.toLowerCase() === name.toLowerCase() && p.active)) {
    showAddToast(`${name} is already in the list!`, '#ef4444');
    return;
  }
  // Mid-session arrival: enter at fair priority so they don't sit behind everyone.
  let initialSatOut = 0;
  const anyCourtActive = state.courts.some(c => c.status === 'playing' || c.status === 'setup');
  if (anyCourtActive || state.gameNumber > 0) {
    const nonZeroSats = getActivePlayers().map(p => p.gamesSatOut || 0).filter(s => s > 0);
    initialSatOut = nonZeroSats.length > 0 ? Math.min(...nonZeroSats) : 1;
  }
  state.players.push({
    id: Date.now() + Math.floor(Math.random() * 1000),
    name,
    arrivalOrder: state.players.length,
    gamesSatOut: initialSatOut,
    gamesPlayed: 0,
    active: true,
    queueOrder: null,
    lastResult: null,
    lastTeammates: [],
  });
  saveState();
  render();
  showAddToast(`✓ ${name} added`, '#4ade80');
  const input = document.getElementById('name-input');
  if (input) { input.value = ''; input.focus(); }
}

function removePlayer(id) {
  // Forbid removing players currently on a court mid-game; require ending the game first.
  const playing = getPlayingIds();
  if (playing.has(id)) {
    if (!confirm('This player is on a court right now. Removing will pull them out mid-game. Continue?')) return;
  }
  const p = findPlayer(id);
  if (p) p.active = false;
  // Clean from any court
  state.courts.forEach(c => {
    c.teamA = c.teamA.filter(pid => pid !== id);
    c.teamB = c.teamB.filter(pid => pid !== id);
    if (c.status === 'setup' && (c.teamA.length + c.teamB.length < PLAYERS_PER_COURT)) {
      c.teamA = []; c.teamB = []; c.status = 'idle';
    }
  });
  // Clean from any pair
  state.pairs = state.pairs.filter(pair => pair[0] !== id && pair[1] !== id);
  saveState();
  render();
}

function reactivatePlayer(id) {
  const p = findPlayer(id);
  if (p) {
    p.active = true;
    p.gamesSatOut = 0;
    p.queueOrder = null;
    p.lastResult = null;
    p.lastTeammates = [];
  }
  saveState();
  render();
}

// --- Reorder modes (waiting queue) ---
function toggleEditMode() {
  state.editMode = !state.editMode;
  if (!state.editMode) { state.swapMode = false; state.swapFirst = null; state.pairMode = false; state.pairFirst = null; }
  render();
}

function toggleSwapMode() {
  state.swapMode = !state.swapMode;
  state.swapFirst = null;
  if (state.swapMode) state.pairMode = false;
  render();
}

function togglePairMode() {
  state.pairMode = !state.pairMode;
  state.pairFirst = null;
  if (state.pairMode) state.swapMode = false;
  render();
}

function assignManualOrder() {
  const sorted = getActivePlayers()
    .filter(p => !getPlayingIds().has(p.id))
    .sort((a, b) => getPriority(b) - getPriority(a));
  sorted.forEach((p, i) => { p.queueOrder = i; });
}

function handleSwapTap(id) {
  if (!state.swapMode) return;
  if (state.swapFirst === null) {
    state.swapFirst = id;
    render();
  } else if (state.swapFirst === id) {
    state.swapFirst = null;
    render();
  } else {
    assignManualOrder();
    const p1 = findPlayer(state.swapFirst);
    const p2 = findPlayer(id);
    if (p1 && p2) {
      const tmp = p1.queueOrder;
      p1.queueOrder = p2.queueOrder;
      p2.queueOrder = tmp;
      state.swappedIds = [p1.id, p2.id];
      showAddToast(`🔄 ${p1.name} ↔ ${p2.name} swapped`, '#a855f7');
    }
    state.swapFirst = null;
    state.swapMode = false;
    saveState();
    render();
    setTimeout(() => { state.swappedIds = []; render(); }, 600);
  }
}

function handlePairTap(id) {
  if (!state.pairMode) return;
  if (state.pairFirst === null) {
    // If already paired, breaking the pair is one tap
    const partner = getPartner(id);
    if (partner !== null) {
      state.pairs = state.pairs.filter(pair => !(pair.includes(id) && pair.includes(partner)));
      const p1 = findPlayer(id), p2 = findPlayer(partner);
      saveState();
      showAddToast(`💔 ${p1?.name} & ${p2?.name} unpaired`, '#888');
      render();
      return;
    }
    state.pairFirst = id;
    render();
  } else if (state.pairFirst === id) {
    state.pairFirst = null;
    render();
  } else {
    // Break any existing pair for either player, then pair them.
    state.pairs = state.pairs.filter(pair => !pair.includes(state.pairFirst) && !pair.includes(id));
    state.pairs.push([state.pairFirst, id]);
    const p1 = findPlayer(state.pairFirst), p2 = findPlayer(id);
    showAddToast(`🤝 ${p1?.name} & ${p2?.name} paired`, '#ec4899');
    state.pairFirst = null;
    state.pairMode = false;
    saveState();
    render();
  }
}

// --- Toasts ---
function showAddToast(msg, color) {
  const toast = document.getElementById('add-toast');
  if (toast) {
    toast.textContent = msg;
    toast.style.color = color || '#4ade80';
    toast.style.opacity = '1';
    clearTimeout(window._addToastTimer);
    window._addToastTimer = setTimeout(() => { toast.style.opacity = '0'; }, 2000);
  }
}

function showBottomToast(msg, color) {
  const toast = document.getElementById('bottom-toast');
  if (toast) {
    toast.textContent = msg;
    toast.style.color = color || '#4ade80';
    toast.style.opacity = '1';
    clearTimeout(window._bottomToastTimer);
    window._bottomToastTimer = setTimeout(() => { toast.style.opacity = '0'; }, 2000);
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

// --- Render ---
function playerRowHTML(p, opts = {}) {
  const { rank, isNextUp, status } = opts;
  const sat = p.gamesSatOut || 0;
  const satClass = sat >= 2 ? 'sat-2' : sat === 1 ? 'sat-1' : 'sat-0';
  const isSwapSelected = state.swapMode && state.swapFirst === p.id;
  const isPairSelected = state.pairMode && state.pairFirst === p.id;
  const isSwapAnim = state.swappedIds.includes(p.id);
  const rowClass = (status === 'playing' ? 'playing' : isNextUp ? 'next-up' : '') +
    (isSwapSelected ? ' swap-select' : '') +
    (isPairSelected ? ' pair-select' : '') +
    (isSwapAnim ? ' swap-anim' : '');
  const partner = getPartner(p.id);
  const partnerName = partner != null ? findPlayer(partner)?.name : null;
  const tagBits = [];
  if (sat > 0) tagBits.push(`<span class="${satClass}">⏳ sat ${sat}</span>`);
  if (p.lastResult === 'W') tagBits.push(`<span class="tag-w">W</span>`);
  if (p.lastResult === 'L') tagBits.push(`<span class="tag-l">L</span>`);
  if (partnerName) tagBits.push(`<span class="tag-pair">🤝 ${esc(partnerName)}</span>`);
  const meta = `${p.gamesPlayed || 0}g played${tagBits.length ? ' · ' + tagBits.join(' · ') : ''}`;

  let onclick = '';
  let cursor = '';
  if (state.swapMode && status !== 'playing') { onclick = `onclick="handleSwapTap(${p.id})"`; cursor = 'cursor:pointer;'; }
  else if (state.pairMode) { onclick = `onclick="handlePairTap(${p.id})"`; cursor = 'cursor:pointer;'; }

  const rankHTML = rank ? `<div class="rank${isNextUp ? ' highlight' : ''}">${rank}</div>` : '';

  return `
    <div class="player-row ${rowClass}" ${onclick} style="${cursor}">
      ${rankHTML}
      <div class="player-info">
        <div class="player-name ${status === 'playing' ? 'playing' : ''}">${esc(p.name)}</div>
        <div class="player-meta">${meta}</div>
      </div>
      <button class="remove-btn" onclick="event.stopPropagation();removePlayer(${p.id})" title="Remove">×</button>
    </div>`;
}

function teamPlayerHTML(p, courtId) {
  const isSelected = state.teamSwap.courtId === courtId && state.teamSwap.playerId === p.id;
  const cls = 'team-player swap-target' + (isSelected ? ' swap-selected' : '');
  const partner = getPartner(p.id);
  const partnerInTeam = partner != null && [...state.courts[courtId].teamA, ...state.courts[courtId].teamB].includes(partner);
  const pairTag = partnerInTeam ? ` <span class="tag-pair" style="font-size:11px">🤝</span>` : '';
  const tag = p.lastResult === 'W' ? ` <span class="tag-w" style="font-size:11px">W</span>` :
              p.lastResult === 'L' ? ` <span class="tag-l" style="font-size:11px">L</span>` : '';
  return `<div class="${cls}" onclick="pickTeamSwap(${courtId}, ${p.id})"><span>${esc(p.name)}${pairTag}${tag}</span></div>`;
}

function courtCardHTML(court) {
  const status = court.status;
  const statusLabel = status === 'idle' ? 'Idle' : status === 'setup' ? 'Setting up' : 'Playing';
  let body = '';

  if (status === 'idle') {
    const waiting = getWaitingPlayers();
    if (waiting.length < PLAYERS_PER_COURT) {
      body = `<div class="court-empty">Waiting for ${PLAYERS_PER_COURT - waiting.length} more player${waiting.length === PLAYERS_PER_COURT - 1 ? '' : 's'}</div>`;
    } else {
      body = `<button class="game-btn start" style="margin-bottom:0" onclick="setupCourt(${court.id})">🥒 Start Game on Court ${court.id + 1}</button>`;
    }
  } else if (status === 'setup' || status === 'playing') {
    const teamA = court.teamA.map(findPlayer).filter(Boolean);
    const teamB = court.teamB.map(findPlayer).filter(Boolean);
    body += `<div class="team"><div class="team-label a">Team A</div>`;
    teamA.forEach(p => { body += teamPlayerHTML(p, court.id); });
    body += `</div>`;
    body += `<div class="team-vs">VS</div>`;
    body += `<div class="team"><div class="team-label b">Team B</div>`;
    teamB.forEach(p => { body += teamPlayerHTML(p, court.id); });
    body += `</div>`;

    if (status === 'setup') {
      if (state.teamSwap.courtId === court.id && state.teamSwap.playerId != null) {
        body += `<div class="swap-banner" style="margin-bottom:8px;margin-top:8px">Tap a player on the other team to swap</div>`;
      } else {
        body += `<div style="font-size:11px;color:#666;text-align:center;margin:8px 0 6px">Tap two players on different teams to swap</div>`;
      }
      body += `<div class="court-actions">
        <button class="court-btn cancel" onclick="cancelCourtSetup(${court.id})">Cancel</button>
        <button class="court-btn regen" onclick="regenerateTeams(${court.id})">🔀 Reshuffle</button>
        <button class="court-btn start" onclick="startCourtGame(${court.id})">Start</button>
      </div>`;
    } else {
      body += `<div class="court-actions">
        <button class="court-btn win-a" onclick="endCourtGame(${court.id}, 'A')">Team A Won</button>
        <button class="court-btn win-b" onclick="endCourtGame(${court.id}, 'B')">Team B Won</button>
      </div>`;
    }
  }

  const gameLabel = court.status === 'playing' && court.gameNumber ? ` · Game ${court.gameNumber}` : '';
  return `
    <div class="court">
      <div class="court-header">
        <div class="court-title">Court ${court.id + 1}${gameLabel}</div>
        <div class="court-status ${status}">${statusLabel}</div>
      </div>
      ${body}
    </div>`;
}

function render() {
  const app = document.getElementById('app');

  // Setup screen if courts not chosen
  if (state.numCourts == null) {
    app.innerHTML = `
      <div class="header">
        <div style="font-size:32px;margin-bottom:4px">🥒</div>
        <h1>Pickle Queue</h1>
        <p>Doubles rotation · multi-court · stacking-style mixing</p>
      </div>
      <div class="setup-card">
        <h2>How many courts today?</h2>
        <p>Pick at session start — you can't change this mid-session.</p>
        <div class="court-pick">
          <button onclick="chooseCourts(1)">1</button>
          <button onclick="chooseCourts(2)">2</button>
          <button onclick="chooseCourts(3)">3</button>
        </div>
      </div>
    `;
    return;
  }

  const active = getActivePlayers();
  const inactive = state.players.filter(p => !p.active);
  const waiting = getWaitingPlayers();
  const playingCount = getPlayingIds().size;
  const courtsRunning = state.courts.filter(c => c.status === 'playing').length;

  let html = `
    <div class="header">
      <div style="font-size:32px;margin-bottom:4px">🥒</div>
      <h1>Pickle Queue</h1>
      <p>${state.numCourts} court${state.numCourts > 1 ? 's' : ''} · doubles · fair rotation</p>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-val" style="color:#22c55e">${active.length}</div><div class="stat-label">Players</div></div>
      <div class="stat"><div class="stat-val" style="color:#3b82f6">${courtsRunning}/${state.numCourts}</div><div class="stat-label">Courts</div></div>
      <div class="stat"><div class="stat-val" style="color:#f59e0b">${state.gameNumber || '—'}</div><div class="stat-label">Games</div></div>
      <div class="stat"><div class="stat-val" style="color:#ef4444">${waiting.length}</div><div class="stat-label">Waiting</div></div>
    </div>
    <div class="add-row">
      <input id="name-input" placeholder="Add player name..." onkeydown="if(event.key==='Enter'){addPlayer(this.value);}" />
      <button onmousedown="event.preventDefault()" onclick="const i=document.getElementById('name-input');addPlayer(i.value);">Add</button>
    </div>
    <div id="add-toast" style="text-align:center;font-size:13px;margin:-12px 0 12px;opacity:0;transition:opacity 0.3s;height:20px"></div>
  `;

  // Edit / Swap / Pair bar
  if (active.length > 1) {
    html += `<div class="edit-bar">
      <button class="${state.editMode && !state.swapMode && !state.pairMode ? 'active' : ''}" onclick="toggleEditMode()">✏️ ${state.editMode ? 'Done' : 'Edit'}</button>
      <button class="${state.swapMode ? 'swap-active' : ''}" onclick="${state.editMode ? 'toggleSwapMode()' : 'state.editMode=true;toggleSwapMode();'}">🔄 Swap Order</button>
      <button class="${state.pairMode ? 'pair-active' : ''}" onclick="${state.editMode ? 'togglePairMode()' : 'state.editMode=true;togglePairMode();'}">🤝 Pair</button>
    </div>`;
  }
  if (state.swapMode) {
    html += `<div class="swap-banner">${state.swapFirst ? 'Now tap the second player to swap with' : 'Tap the first player to swap'}</div>`;
  }
  if (state.pairMode) {
    html += `<div class="pair-banner">${state.pairFirst ? 'Now tap their partner. Tap a paired player alone to break the pair.' : 'Tap a player to start pairing. Tap a paired player to unpair.'}</div>`;
  }

  // Courts
  state.courts.forEach(c => { html += courtCardHTML(c); });

  // Waiting queue
  if (waiting.length > 0) {
    html += `<div class="section"><button class="section-header">⏳ Waiting Queue <span class="count">(${waiting.length})</span></button>`;
    waiting.forEach((p, i) => {
      const isNext = i < PLAYERS_PER_COURT;
      html += playerRowHTML(p, { rank: i + 1, isNextUp: isNext });
    });
    html += `</div>`;
  } else if (active.length > 0 && playingCount === active.length) {
    html += `<div class="court-empty">All players on court</div>`;
  }

  // Inactive
  if (inactive.length > 0) {
    html += `<div class="section"><button class="section-header" onclick="document.getElementById('inactive-list').style.display=document.getElementById('inactive-list').style.display==='none'?'block':'none'">👋 Left <span class="count">(${inactive.length})</span></button><div id="inactive-list" style="display:none;margin-top:6px">`;
    inactive.forEach(p => {
      html += `<div class="inactive-row"><span>${esc(p.name)}</span><button class="return-btn" onclick="reactivatePlayer(${p.id})">Return</button></div>`;
    });
    html += `</div></div>`;
  }

  // History
  if (state.history.length > 0) {
    html += `<div style="margin-top:16px"><button class="history-toggle" onclick="state.showHistory=!state.showHistory;render();">${state.showHistory ? '▼' : '▶'} Game History (${state.history.length})</button>`;
    if (state.showHistory) {
      html += `<div style="margin-top:8px">`;
      [...state.history].reverse().forEach(h => {
        const aWon = h.winner === 'A';
        html += `<div class="history-item">
          <div class="history-game">Game ${h.game} · Court ${h.court}</div>
          <div class="history-teams">
            <div class="${aWon ? 'history-team-w' : 'history-team-l'}">${aWon ? '🏆 ' : ''}A: ${h.teamA.map(esc).join(' & ')}</div>
            <div class="${!aWon ? 'history-team-w' : 'history-team-l'}">${!aWon ? '🏆 ' : ''}B: ${h.teamB.map(esc).join(' & ')}</div>
          </div>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }

  // Copy / export
  html += `
    <div style="margin-top:24px;">
      <button onclick="copyQueue()" style="width:100%;padding:14px;border-radius:12px;border:1px solid #22c55e;background:#22c55e22;color:#22c55e;font-size:15px;font-weight:600;cursor:pointer;">📋 Copy Queue Summary</button>
      <button onclick="copyPlayerList()" style="width:100%;padding:14px;border-radius:12px;border:1px solid #3b82f6;background:#3b82f622;color:#3b82f6;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;">📝 Copy Player List</button>
      <div id="bottom-toast" style="text-align:center;font-size:13px;margin-top:8px;opacity:0;transition:opacity 0.3s;height:20px"></div>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px;">
      <button onclick="exportTransferCode()" style="flex:1;padding:12px;border-radius:12px;border:1px solid #a855f7;background:#a855f722;color:#a855f7;font-size:14px;font-weight:600;cursor:pointer;">📤 Export</button>
      <button onclick="showImportDialog()" style="flex:1;padding:12px;border-radius:12px;border:1px solid #a855f7;background:#a855f722;color:#a855f7;font-size:14px;font-weight:600;cursor:pointer;">📥 Import</button>
    </div>
    <div style="text-align:center;font-size:11px;color:#555;margin-top:6px;">Transfer queue to another phone</div>
    <div style="margin-top:16px;text-align:center"><button onclick="resetAll()" style="background:none;border:1px solid #333;color:#555;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer">Reset All</button></div>
    <div class="info-box">
      <div class="title">How it works</div>
      <div class="desc">When a court frees up, the next 4 players (longest waited) get pulled. Teams auto-form to mix winners with losers and avoid pairing the same teammates twice in a row. Tap players to swap them between teams or hit Reshuffle to cycle through the 3 possible team splits. 🤝 Pair = mark two players (e.g. spouses) so the system tries to put them on the same team when both are near the front of the queue.</div>
    </div>
  `;

  app.innerHTML = html;
}

function resetAll() {
  if (!confirm('Reset everything? This clears all players, games, and pairs.')) return;
  state.numCourts = null;
  state.players = [];
  state.courts = [];
  state.pairs = [];
  state.gameNumber = 0;
  state.history = [];
  state.editMode = false;
  state.swapMode = false;
  state.pairMode = false;
  state.swapFirst = null;
  state.pairFirst = null;
  state.teamSwap = { courtId: null, playerId: null };
  saveState();
  render();
}

// --- Export / Import ---
function exportTransferCode() {
  const data = {
    nc: state.numCourts,
    p: state.players.map(p => ({
      id: p.id, n: p.name, a: p.arrivalOrder, s: p.gamesSatOut || 0,
      g: p.gamesPlayed || 0, ac: p.active, lr: p.lastResult || null,
      lt: p.lastTeammates || [],
    })),
    c: state.courts,
    pr: state.pairs,
    gn: state.gameNumber,
    h: state.history,
  };
  const code = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  navigator.clipboard.writeText(code).then(() => {
    showBottomToast('✓ Transfer code copied!', '#a855f7');
  }).catch(() => {
    prompt('Copy this transfer code:', code);
  });
}

function showImportDialog() {
  const code = prompt('Paste the transfer code:');
  if (!code || !code.trim()) return;
  try {
    const json = decodeURIComponent(escape(atob(code.trim())));
    const data = JSON.parse(json);
    if (!data.p || !Array.isArray(data.p)) throw new Error('Invalid');
    state.numCourts = data.nc != null ? data.nc : 1;
    state.players = data.p.map(p => ({
      id: p.id, name: p.n, arrivalOrder: p.a,
      gamesSatOut: p.s || 0, gamesPlayed: p.g || 0,
      active: p.ac !== false, queueOrder: null,
      lastResult: p.lr || null, lastTeammates: p.lt || [],
    }));
    state.courts = data.c || [];
    state.pairs = data.pr || [];
    state.gameNumber = data.gn || 0;
    state.history = data.h || [];
    saveState();
    render();
    showBottomToast(`✓ Imported ${state.players.length} players`, '#a855f7');
  } catch(e) {
    alert('Invalid transfer code. Make sure you copied the full code.');
  }
}

function copyPlayerList() {
  const all = [...state.players].sort((a, b) => a.arrivalOrder - b.arrivalOrder);
  if (all.length === 0) { showBottomToast('No players to copy', '#ef4444'); return; }
  let text = '🥒 PLAYER LIST\n═══════════════════\n\n';
  all.forEach((p, i) => {
    const status = p.active ? '' : ' (left)';
    text += `${i + 1}. ${p.name}${status}\n`;
  });
  const activeCount = all.filter(p => p.active).length;
  text += `\nTotal: ${all.length} players (${activeCount} active)`;
  copyToClipboard(text, '✓ Player list copied!');
}

function copyQueue() {
  let text = '🥒 PICKLE QUEUE\n═══════════════════\n\n';
  if (state.history.length > 0) {
    state.history.forEach(h => {
      const aWon = h.winner === 'A';
      text += `Game ${h.game} (Court ${h.court}):\n`;
      text += `  ${aWon ? '🏆' : '  '} A: ${h.teamA.join(' & ')}\n`;
      text += `  ${!aWon ? '🏆' : '  '} B: ${h.teamB.join(' & ')}\n\n`;
    });
  }
  state.courts.forEach(c => {
    if (c.status === 'playing') {
      const a = c.teamA.map(id => findPlayer(id)?.name || '?');
      const b = c.teamB.map(id => findPlayer(id)?.name || '?');
      text += `Game ${c.gameNumber} (Court ${c.id + 1}, IN PROGRESS):\n`;
      text += `  A: ${a.join(' & ')}\n`;
      text += `  B: ${b.join(' & ')}\n\n`;
    }
  });
  const waiting = getWaitingPlayers();
  if (waiting.length > 0) {
    text += `Waiting Queue:\n`;
    waiting.forEach((p, i) => {
      const sat = p.gamesSatOut > 0 ? ` [sat ${p.gamesSatOut}]` : '';
      text += `  ${i + 1}. ${p.name}${sat}\n`;
    });
    text += '\n';
  }
  const active = getActivePlayers();
  if (active.length > 0) {
    text += '───────────────────\nPlayer Stats:\n';
    [...active].sort((a, b) => getPriority(b) - getPriority(a)).forEach(p => {
      const last = p.lastResult ? ` last:${p.lastResult}` : '';
      text += `  ${p.name} — ${p.gamesPlayed || 0}g, sat ${p.gamesSatOut || 0}${last}\n`;
    });
  }
  if (state.pairs.length > 0) {
    text += '\n🤝 Pairs:\n';
    state.pairs.forEach(pair => {
      const a = findPlayer(pair[0])?.name, b = findPlayer(pair[1])?.name;
      if (a && b) text += `  ${a} & ${b}\n`;
    });
  }
  copyToClipboard(text, '✓ Queue summary copied!');
}

function copyToClipboard(text, msg) {
  navigator.clipboard.writeText(text).then(() => {
    showBottomToast(msg, '#4ade80');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    showBottomToast(msg, '#4ade80');
  });
}

render();
</script>
</body>
</html>
